<body class="container white-background">
  <div class="loading-section" *ngIf="loading">
    <app-loading-icon></app-loading-icon>
  </div>

  <div *ngIf="!loading">
    <div class="path-container">
      <p (click)="goBack()" class="path page-title">INVENTORY ></p>
      <p class="subpage">{{ product.name }}</p>
    </div>
    <div class="product-body">
      <div class="product-image-box">
        <img [src]="product.imageUrl" alt="product-image" class="product-image" (load)="loading=false">
      </div>
      <div class="product-description-container">
        <div class="product-descriptions">
          <p class="product-name">{{ product.name }}</p>
          <p class="product-description">{{ product.description }}</p>
          <div class="price-container">
            <p>${{ product.price }}</p>
          </div>
        </div>
        <div class="reserve-container">
          <app-reserve></app-reserve>
        </div>
      </div>
    </div>

    <!-- <div class="footer-container"> -->
    <div class="deposit-container">
      <img class="deposit-line" src="images/deposit-line.png">
      <p class="deposit-text blue-background">
        <b>A deposit of ${{ product.deposit }} will be added to your total.</b><br> 
        This is refundable upon return of items within the agreed upon time, with no damages.
      </p>
      <img class="deposit-line" src="images/deposit-line-bow.png">
    </div>
  </div>
</body>
