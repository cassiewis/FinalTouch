<body>
    <div *ngIf="loading">
      <p>Loading Products...</p>
      <!-- You can replace this with your custom loading icon -->
      <!-- <app-loading-icon></app-loading-icon> -->
    </div>
  
    <ng-container *ngIf="!loading">
      <div *ngIf="products.length > 0; else noProducts" class="products-grid">
        <div *ngFor="let product of products" class="product-item">
          <app-product-box [product]="product"></app-product-box>
        </div>
      </div>
      <ng-template #noProducts>
        <p>No products found.<br><br>We're always growing our inventory, check back again soon!</p>
      </ng-template>
    </ng-container>
  </body>
