<body class="white-background">
    <div class="title-side">
      <div class="title-container">
        <p class="secondary-font green-font read-success-stories">READ OUR SUCCESS STORIES</p>
        <p class="title"><i class="pink-font">Kind Words</i> From<br>Our Past Clients</p>
        <p>Take a look at our past client's reviews and browse the images on our inspo page!</p>
        <button (click)="routeToInspo()" class="button-theme light-pink-background">inspo</button>
        </div>
    </div>
    <div class="reviews-side">
      <div class="review" *ngFor="let review of reviews">
        <p class="stars">
          <span class ="yellow-font" *ngFor="let star of [].constructor(review.stars)">★</span>
        </p>
        <p class="review-text">{{ review.content }}</p>
        <p class="review-author green-font">- {{ review.author }}</p>
      </div>
    </div>
</body>
